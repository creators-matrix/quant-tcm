<body class="bg-stone-950 text-stone-200 min-h-screen flex flex-col font-sans">

<header class="border-b border-stone-800 bg-stone-950 px-6 py-5">
  <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
    <div>
      <div class="text-[11px] text-stone-500 font-mono mb-1">
        <a href="../../../" class="hover:text-amber-400 transition-colors">Matrix</a>
        <span class="text-stone-700"> / </span>
        <a href="../../" class="hover:text-amber-400 transition-colors">Quant TCM</a>
        <span class="text-stone-700"> / </span>
        <span class="text-amber-400">紫微斗数排盘</span>
      </div>
      <h1 class="text-xl font-black text-stone-100 tracking-tight">☯️ 紫微斗数 <span class="text-amber-400">排盘引擎</span></h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="engineStatus" class="text-xs px-2 py-1 rounded font-mono">检测中...</span>
      <a href="../../" class="text-xs text-stone-500 hover:text-amber-400 border border-stone-700 rounded-lg px-3 py-1.5 transition-colors shrink-0">← 返回实验室</a>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto p-6 flex-grow">
  <!-- 输入面板 -->
  <section class="bg-stone-900 border border-stone-700 rounded-xl p-6 mb-8">
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 出生信息</h2>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-4">
      <div>
        <label class="block text-xs text-amber-400 mb-1 font-bold">年</label>
        <input id="inpYear" type="number" value="1990" min="1900" max="2100"
          class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-stone-200 text-sm focus:outline-none focus:border-amber-500">
      </div>
      <div>
        <label class="block text-xs text-amber-400 mb-1 font-bold">月</label>
        <input id="inpMonth" type="number" value="5" min="1" max="12"
          class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-stone-200 text-sm focus:outline-none focus:border-amber-500">
      </div>
      <div>
        <label class="block text-xs text-amber-400 mb-1 font-bold">日</label>
        <input id="inpDay" type="number" value="15" min="1" max="31"
          class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-stone-200 text-sm focus:outline-none focus:border-amber-500">
      </div>
      <div>
        <label class="block text-xs text-amber-400 mb-1 font-bold">时 (0-23)</label>
        <input id="inpHour" type="number" value="9" min="0" max="23"
          class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-stone-200 text-sm focus:outline-none focus:border-amber-500">
      </div>
      <div>
        <label class="block text-xs text-amber-400 mb-1 font-bold">性别</label>
        <select id="inpGender"
          class="w-full bg-stone-800 border border-stone-700 rounded-lg px-3 py-2 text-stone-200 text-sm focus:outline-none focus:border-amber-500">
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
    </div>
    <div class="flex gap-3">
      <button onclick="doChart()"
        class="bg-amber-600 hover:bg-amber-500 text-black font-bold px-6 py-2 rounded-lg text-sm tracking-wider transition">
        开始排盘
      </button>
      <button onclick="loadFamous()"
        class="border border-stone-700 text-stone-400 hover:text-stone-200 px-4 py-2 rounded-lg text-xs transition">
        倪海厦命盘
      </button>
    </div>
  </section>

  <!-- 结果显示区 -->
  <section id="resultSection" class="hidden">

    <!-- 基本信息 -->
    <div id="infoBar" class="bg-stone-900 border border-stone-700 rounded-xl p-4 mb-6 grid grid-cols-2 md:grid-cols-6 gap-3 text-sm"></div>

    <!-- 十二宫格 -->
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 十二宫命盘</h2>
    <div id="palaceGrid" class="mb-8"></div>

    <!-- 大限 -->
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 大限走势</h2>
    <div id="daXianBar" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- 星曜详情 -->
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 主星详情</h2>
    <div id="starDetails" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-8"></div>

    <!-- 格局 -->
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 格局识别</h2>
    <div id="patternsSection" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8"></div>

    <!-- 倪师天纪 -->
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 倪海厦 · 天纪</h2>
    <div id="nihaiSection" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8"></div>

    <!-- 古籍引用 -->
    <h2 class="text-sm text-stone-400 uppercase tracking-widest border-b border-stone-800 pb-2 mb-4">// 古籍引用</h2>
    <div id="classicsSection" class="mb-8"></div>

    <!-- 原始 JSON (调试) -->
    <details class="mb-8">
      <summary class="text-xs text-stone-500 cursor-pointer hover:text-stone-300">调试：原始 JSON 输出</summary>
      <pre id="rawJson" class="mt-2 bg-stone-900 border border-stone-700 rounded-lg p-4 text-xs text-stone-400 overflow-auto max-h-96"></pre>
    </details>
  </section>
</main>

<script>
(function() {
  var statusEl = document.getElementById('engineStatus');

  if (typeof window.Ziwei === 'undefined') {
    statusEl.textContent = '❌ 引擎加载失败';
    statusEl.className = 'text-xs px-2 py-1 rounded font-mono bg-red-900 text-red-300';
    return;
  }
  statusEl.textContent = '✅ 引擎就绪';
  statusEl.className = 'text-xs px-2 py-1 rounded font-mono bg-emerald-900 text-emerald-300';

  window.doChart = function() {
    var year = parseInt(document.getElementById('inpYear').value);
    var month = parseInt(document.getElementById('inpMonth').value);
    var day = parseInt(document.getElementById('inpDay').value);
    var birthHour = parseInt(document.getElementById('inpHour').value);
    var gender = document.getElementById('inpGender').value;

    try {
      var chart = Ziwei.generateChart({
        year: year, month: month, day: day,
        hour: -1, birthHour: birthHour, gender: gender
      });
      renderChart(chart);
      document.getElementById('resultSection').classList.remove('hidden');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
      alert('排盘失败：' + e.message);
      console.error(e);
    }
  };

  window.loadFamous = function() {
    document.getElementById('inpYear').value = 1954;
    document.getElementById('inpMonth').value = 1;
    document.getElementById('inpDay').value = 1;
    document.getElementById('inpHour').value = 0;
    document.getElementById('inpGender').value = 'male';
    doChart();
  };

  function renderChart(chart) {
    var info = chart;
    var infoHTML =
      '<div><span class="text-stone-500 text-xs">命宫</span><br><span class="font-bold text-amber-400">' + Ziwei.BRANCHES[info.mingGongBranch] + '</span></div>' +
      '<div><span class="text-stone-500 text-xs">身宫</span><br><span class="font-bold text-amber-400">' + Ziwei.BRANCHES[info.shenGongBranch] + '</span></div>' +
      '<div><span class="text-stone-500 text-xs">五行局</span><br><span class="font-bold">' + info.wuxingJuName + '</span></div>' +
      '<div><span class="text-stone-500 text-xs">紫微在</span><br><span class="font-bold text-amber-400">' + Ziwei.BRANCHES[info.ziweiPos] + '</span></div>' +
      '<div><span class="text-stone-500 text-xs">当前大限</span><br><span class="font-bold text-emerald-400">' + (info.currentDaXianIndex >= 0 ? info.daXians[info.currentDaXianIndex].palaceName + ' (' + info.daXians[info.currentDaXianIndex].startAge + '-' + info.daXians[info.currentDaXianIndex].endAge + '岁)' : '—') + '</span></div>' +
      '<div><span class="text-stone-500 text-xs">当前年龄</span><br><span class="font-bold">' + info.currentAge + '岁</span></div>';
    document.getElementById('infoBar').innerHTML = infoHTML;

    renderPalaceGrid(chart);
    renderDaXian(chart);
    renderStarDetails(chart);
    renderPatterns(chart);
    renderNihai();
    renderClassics();

    document.getElementById('rawJson').textContent = JSON.stringify(chart, null, 2);
  }

  function renderPalaceGrid(chart) {
    var sorted = chart.palaces.slice().sort(function(a, b) { return a.branch - b.branch; });
    var displayOrder = [5, 6, 7, 8, 4, 9, 3, 10, 2, 1, 0, 11];
    var palaceMap = {};
    sorted.forEach(function(p) { palaceMap[p.branch] = p; });

    var html = '<div class="palace-grid">';
    displayOrder.forEach(function(branch) {
      var p = palaceMap[branch];
      if (!p) { html += '<div class="palace-cell bg-stone-900 border border-stone-800 rounded-lg p-2"></div>'; return; }

      var isMing = p.isMingGong;
      var isShen = p.isShenGong;
      var isCurrent = p.isCurrentDaXian;
      var borderClass = isMing ? 'border-amber-500' : (isShen ? 'border-amber-700' : 'border-stone-700');
      var bgClass = isCurrent ? 'bg-stone-800' : 'bg-stone-900';

      var starHTML = p.stars.slice(0, 8).map(function(s) {
        var cls = 'star-major';
        if (s.type === 'sha') cls = 'star-sha';
        else if (s.type === 'lucky') cls = 'star-lucky';
        else if (s.type === 'minor') cls = 'star-minor';
        var bri = '';
        if (s.brightness === 'bright') bri = ' bright-bright';
        if (s.brightness === 'dim') bri = ' bright-dim';
        var siHuaTag = s.siHua ? ' <span class="text-[10px]">[' + s.siHua + ']</span>' : '';
        return '<span class="' + cls + bri + '">' + s.name + siHuaTag + '</span>';
      }).join('<br>');

      var titleHTML = '<div class="flex justify-between items-center mb-1">' +
        '<span class="text-[10px] text-stone-500">' + Ziwei.BRANCHES[branch] + '</span>' +
        '<span class="text-[11px] font-bold ' + (isMing ? 'text-amber-400' : 'text-stone-300') + '">' + p.name + '</span>' +
        '<span class="text-[10px] text-stone-600">' + Ziwei.STEMS[p.stem] + '</span>' +
        '</div>';

      html += '<div class="palace-cell ' + bgClass + ' border ' + borderClass + ' rounded-lg p-2 overflow-hidden ' + (isMing ? 'ring-1 ring-amber-600/50' : '') + '">' +
        titleHTML +
        '<div class="text-[11px] leading-tight">' + (starHTML || '<span class="text-stone-700">空宫</span>') + '</div>' +
        '</div>';
    });
    html += '</div>';
    document.getElementById('palaceGrid').innerHTML = html;
  }

  function renderDaXian(chart) {
    var html = '';
    chart.daXians.forEach(function(dx, i) {
      var isCurrent = chart.currentDaXianIndex === i;
      var cls = isCurrent ? 'bg-emerald-900 border-emerald-600 text-emerald-200' : 'bg-stone-900 border-stone-700 text-stone-400';
      var dxSiHua = Ziwei.getDaXianSiHua(chart, i);
      var siHuaStr = '';
      if (dxSiHua && dxSiHua.transforms) {
        siHuaStr = ' <span class="text-[10px] opacity-60">[' + dxSiHua.transforms['禄'] + '禄' + dxSiHua.transforms['权'] + '权' + dxSiHua.transforms['科'] + '科' + dxSiHua.transforms['忌'] + '忌]</span>';
      }
      html += '<div class="' + cls + ' border rounded-lg px-3 py-1.5 text-xs">' +
        dx.startAge + '-' + dx.endAge + '岁 ' + dx.palaceName + siHuaStr +
        '</div>';
    });
    document.getElementById('daXianBar').innerHTML = html;
  }

  function renderStarDetails(chart) {
    var majorStars = [];
    var seen = {};
    chart.palaces.forEach(function(p) {
      p.stars.forEach(function(s) {
        if (s.type === 'major' && !seen[s.name]) {
          seen[s.name] = true;
          var desc = Ziwei.STAR_DESCRIPTIONS[s.name] || {};
          majorStars.push({
            name: s.name,
            palace: p.name,
            branch: Ziwei.BRANCHES[p.branch],
            brightness: s.brightness,
            siHua: s.siHua,
            keywords: desc.keywords || '',
            nature: desc.nature || '',
            element: desc.element || ''
          });
        }
      });
    });

    var html = '';
    majorStars.forEach(function(s) {
      var briColor = s.brightness === 'bright' ? 'text-yellow-400' : (s.brightness === 'dim' ? 'text-red-400' : 'text-stone-400');
      var briLabel = s.brightness === 'bright' ? '庙旺' : (s.brightness === 'dim' ? '陷' : '平');
      var siHuaTag = s.siHua ? ' <span class="text-[10px] bg-amber-900 text-amber-300 px-1 rounded">' + s.siHua + '</span>' : '';
      html += '<div class="bg-stone-900 border border-stone-700 rounded-lg p-3">' +
        '<div class="flex justify-between items-center mb-1">' +
        '<span class="font-bold text-amber-400">' + s.name + '</span>' +
        '<span class="text-xs ' + briColor + '">' + briLabel + siHuaTag + '</span>' +
        '</div>' +
        '<div class="text-[11px] text-stone-400">' + s.keywords + '</div>' +
        '<div class="text-[10px] text-stone-500 mt-1">' + s.element + ' · ' + s.nature + ' · 在' + s.palace + '(' + s.branch + ')</div>' +
        '</div>';
    });
    document.getElementById('starDetails').innerHTML = html;
  }

  var levelMap = {
    excellent: { label: '上格', cls: 'bg-amber-900 text-amber-300 border-amber-600' },
    good:      { label: '吉格', cls: 'bg-emerald-900 text-emerald-300 border-emerald-600' },
    neutral:   { label: '平',   cls: 'bg-stone-800 text-stone-300 border-stone-600' },
    caution:   { label: '警示', cls: 'bg-red-900 text-red-300 border-red-600' },
  };

  function renderPatterns(chart) {
    var container = document.getElementById('patternsSection');
    if (!container) return;

    if (typeof window.Ziwei === 'undefined' || typeof window.Ziwei.Patterns === 'undefined') {
      container.innerHTML = '<div class="text-stone-500 text-sm italic">格局引擎未加载</div>';
      return;
    }

    try {
      var patterns = Ziwei.Patterns.detectPatterns(chart);
      if (!patterns || !patterns.length) {
        container.innerHTML = '<div class="text-stone-500 text-sm italic">未识别到标准格局（此命盘不落已知格局范畴，属众人盘）</div>';
        return;
      }

      var order = { excellent: 0, good: 1, neutral: 2, caution: 3 };
      patterns.sort(function(a, b) { return (order[a.level] || 9) - (order[b.level] || 9); });

      var html = '';
      patterns.forEach(function(p) {
        var lvl = levelMap[p.level] || levelMap.neutral;
        var condHTML = '';
        if (p.conditions) {
          var parts = [];
          if (p.conditions.required && p.conditions.required.length)
            parts.push('<span class="text-emerald-400">必须:</span> ' + p.conditions.required.join('；'));
          if (p.conditions.bonus && p.conditions.bonus.length)
            parts.push('<span class="text-amber-400">加分:</span> ' + p.conditions.bonus.join('；'));
          if (p.conditions.breaking && p.conditions.breaking.length)
            parts.push('<span class="text-red-400">破格:</span> ' + p.conditions.breaking.join('；'));
          condHTML = parts.join('<br>');
        }

        html += '<div class="bg-stone-900 border ' + lvl.cls.split(' ').slice(1).join(' ') + ' rounded-lg p-4">' +
          '<div class="flex justify-between items-start mb-2">' +
            '<span class="font-bold text-base">' + p.name + '</span>' +
            '<span class="text-xs px-2 py-0.5 rounded ' + lvl.cls + '">' + lvl.label + '</span>' +
          '</div>' +
          '<p class="text-xs text-stone-300 mb-2 leading-relaxed">' + p.description + '</p>' +
          (condHTML ? '<div class="text-[10px] leading-relaxed bg-stone-950 rounded-lg p-2 mt-2">' + condHTML + '</div>' : '') +
          (p.source ? '<div class="text-[10px] text-stone-500 mt-2">📖 ' + p.source + '</div>' : '') +
          '</div>';
      });
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<div class="text-red-400 text-xs">格局识别出错: ' + e.message + '</div>';
      console.error(e);
    }
  }

  function renderNihai() {
    var container = document.getElementById('nihaiSection');
    if (!container) return;

    if (typeof window.Ziwei === 'undefined' || typeof window.Ziwei.Nihai === 'undefined') {
      container.innerHTML = '<div class="text-stone-500 text-sm italic">倪师知识库未加载</div>';
      return;
    }

    var N = window.Ziwei.Nihai;
    var html = '';

    if (N.NI_HAIXIA_BIO) {
      var bio = N.NI_HAIXIA_BIO;
      html += '<div class="bg-stone-900 border border-amber-700 rounded-lg p-4 md:col-span-2">' +
        '<div class="flex justify-between items-start mb-2">' +
          '<span class="font-bold text-base text-amber-400">' + bio.name + ' <span class="text-stone-500 text-xs">(' + bio.birth + ' – ' + bio.death + ')</span></span>' +
          '<span class="text-[10px] text-stone-500">' + bio.title + '</span>' +
        '</div>' +
        '<p class="text-xs text-stone-300 leading-relaxed">' + bio.corePhilosophy.slice(0, 3).join(' · ') + '</p>' +
        '<div class="text-[10px] text-stone-500 mt-2">师承: ' + bio.teachers.map(function(t) { return t.name; }).join(' → ') + '</div>' +
        '</div>';
    }

    if (N.SANJI_CATEGORIES) {
      N.SANJI_CATEGORIES.forEach(function(cat) {
        var stats = null;
        if (cat.key === 'tianji') stats = N.TIANJI_STATS;
        else if (cat.key === 'renji') stats = N.RENJI_STATS;
        else if (cat.key === 'diji') stats = N.DIJI_STATS;

        var statHTML = '';
        if (stats) {
          statHTML = '<div class="text-[10px] text-stone-500 mt-1">' +
            (stats.totalModules ? stats.totalModules + '个模块 · ' : '') +
            (stats.totalChapters ? stats.totalChapters + '章节 · ' : '') +
            (stats.totalAcuExperiences ? stats.totalAcuExperiences + '针灸经验 · ' : '') +
            (stats.totalFormulas ? stats.totalFormulas + '方剂 · ' : '') +
            '</div>';
        }

        html += '<div class="bg-stone-900 border border-stone-700 rounded-lg p-3">' +
          '<div class="flex items-center gap-2 mb-1">' +
            '<span class="text-lg">' + cat.icon + '</span>' +
            '<span class="font-bold text-sm" style="color:' + cat.color + '">' + cat.name + '</span>' +
            '<span class="text-[10px] text-stone-500">' + cat.meaning + '</span>' +
          '</div>' +
          statHTML +
          '</div>';
      });
    }

    container.innerHTML = html;
  }

  function renderClassics() {
    var container = document.getElementById('classicsSection');
    if (!container) return;

    if (typeof window.Ziwei === 'undefined' || typeof window.Ziwei.Classics === 'undefined') {
      container.innerHTML = '<div class="text-stone-500 text-sm italic">古籍数据库未加载</div>';
      return;
    }

    var C = window.Ziwei.Classics;
    var entries = [];

    [C.GUSUIFU_VERSES, C.QUANJI_ARTICLES, C.QUANSHU_CHAPTERS].forEach(function(src) {
      if (!src || !src.chapters) return;
      var sourceName = src.title || '';
      src.chapters.forEach(function(ch) {
        if (ch.paragraphs) {
          ch.paragraphs.forEach(function(p) {
            entries.push({ text: p.text, source: sourceName, chapter: ch.title });
          });
        }
      });
    });

    if (!entries.length) {
      container.innerHTML = '<div class="text-stone-500 text-sm italic">暂无古籍数据</div>';
      return;
    }

    var samples = entries.slice(0, 6);
    var html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-3">';
    samples.forEach(function(e) {
      html += '<div class="bg-stone-900 border border-stone-700 rounded-lg p-3">' +
        '<p class="text-xs text-stone-300 leading-relaxed italic">"' + e.text + '"</p>' +
        '<div class="text-[10px] text-stone-500 mt-2">— ' + e.source + ' · ' + e.chapter + '</div>' +
        '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }
})();
</script>

</body>
</html>
