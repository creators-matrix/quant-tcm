<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古今中医剂量精密换算器 - 老码农工具箱</title>
    <!-- 使用现代的 TailwindCSS，不需要写繁琐的 CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">

    <!-- 头部导航 -->
    <header class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-emerald-700">🌿 量化中医工具箱</h1>
            <span class="text-xs text-gray-500">AI 辅助精密计算</span>
        </div>
    </header>

    <!-- 主体内容区 -->
    <main class="max-w-xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-center text-gray-900 mb-2">古今剂量换算</h2>
            <p class="text-sm text-center text-gray-500 mb-8">精准将汉代度量衡（《伤寒论》等）换算为现代克重</p>

            <!-- 输入表单 -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">1. 选择古籍时代/标准</label>
                    <select id="eraSelect" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                        <option value="han">东汉标准 (张仲景《伤寒论》: 1两 ≈ 13.8g)</option>
                        <option value="tang">唐代标准 (孙思邈《千金方》: 1两 ≈ 41.3g)</option>
                        <option value="mingqing">明清标准 (1两 ≈ 37.3g)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">2. 古代数量</label>
                        <input type="number" id="inputValue" value="1" min="0" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-mono text-lg transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">3. 古代单位</label>
                        <select id="unitSelect" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                            <option value="liang">两</option>
                            <option value="qian">钱</option>
                            <option value="fen">分</option>
                            <option value="sheng">升 (液体/颗粒折算)</option>
                        </select>
                    </div>
                </div>

                <!-- 计算按钮 -->
                <button onclick="calculate()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl shadow-md hover:shadow-lg transform active:scale-[0.98] transition duration-150">
                    一键精准换算
                </button>

                <!-- 结果展示区 -->
                <div class="mt-8 bg-emerald-50 rounded-2xl p-5 border border-emerald-100 hidden" id="resultBox">
                    <div class="text-xs font-semibold text-emerald-700 uppercase tracking-wider mb-1">换算结果</div>
                    <div class="flex items-baseline text-gray-900">
                        <span class="text-4xl font-extrabold font-mono text-emerald-600" id="resultValue">0</span>
                        <span class="text-xl font-bold ml-2">克 (g)</span>
                    </div>
                    <p class="text-xs text-emerald-800/70 mt-3 leading-relaxed border-t border-emerald-200/50 pt-3" id="resultTip">
                        * 注：此换算依据现代考古（如中国计量科学院）权威数据，临床应用请遵医嘱。
                    </p>
                </div>
            </div>
        </div>

        <!-- 预留的 Google AdSense 广告位占位符 -->
        <div class="mt-8 bg-gray-100 rounded-xl p-4 text-center text-xs text-gray-400 border border-dashed border-gray-200">
            [广告占位符 - 待通过 Google AdSense 审核后接入]
        </div>
    </main>

    <!-- 底部 -->
    <footer class="text-center py-6 text-xs text-gray-400 border-t border-gray-100 bg-white">
        &copy; 2026 量化中医工具箱. All Code and Concepts Co-created with AI.
    </footer>

    <!-- 核心换算逻辑 JS -->
    <script>
        function calculate() {
            const era = document.getElementById('eraSelect').value;
            const value = parseFloat(document.getElementById('inputValue').value) || 0;
            const unit = document.getElementById('unitSelect').value;
            
            // 基础换算率（以克为单位）
            let baseLiangInGram = 13.8; // 默认东汉
            let tipText = "依据东汉考古发掘，张仲景时代一两标准折算为现代 13.8 克。";

            if (era === 'tang') {
                baseLiangInGram = 41.3;
                tipText = "唐代推行大两制，孙思邈《千金方》时期一两约合现代 41.3 克。";
            } else if (era === 'mingqing') {
                baseLiangInGram = 37.3;
                tipText = "明清十六两制趋于稳定，一两约合现代 37.3 克。";
            }

            // 根据单位计算（1两 = 10钱 = 100分；升按东汉容量通常折算一升约 200ml/200g 概算）
            let totalGrams = 0;
            if (unit === 'liang') {
                totalGrams = value * baseLiangInGram;
            } else if (unit === 'qian') {
                totalGrams = value * (baseLiangInGram / 10);
            } else if (unit === 'fen') {
                totalGrams = value * (baseLiangInGram / 100);
            } else if (unit === 'sheng') {
                // 张仲景时代的一升半夏、五味子等，现代考证通常按容量和比重折算
                totalGrams = value * (era === 'han' ? 60 : 200); 
                tipText += "【注】古籍中的‘升’为容量单位，此处理论折算为质重，仅供参考。";
            }

            // 显示结果
            document.getElementById('resultValue').innerText = totalGrams.toFixed(2);
            document.getElementById('resultTip').innerText = "* " + tipText + " 临床应用及处方请务必遵循执业医师指导。";
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
